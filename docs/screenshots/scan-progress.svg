<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">SecureCheck scan progress popup state</title>
  <desc id="desc">Demo screenshot showing the SecureCheck scan progress view.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="1" stop-color="#e6edf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5e6ad2"/>
      <stop offset="1" stop-color="#b0baff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#1b2437" flood-opacity=".24"/>
    </filter>
  </defs>
  <rect width="920" height="640" fill="url(#page)"/>
  <rect x="90" y="68" width="740" height="504" rx="18" fill="#ffffff" stroke="#d9e1ec"/>
  <rect x="124" y="100" width="668" height="420" rx="14" fill="#0d0f14" filter="url(#shadow)"/>
  <rect x="124" y="100" width="668" height="64" rx="14" fill="#13161d"/>
  <rect x="124" y="150" width="668" height="1" fill="#2a3140"/>
  <g transform="translate(150 114)">
    <path d="M24 2 42 9v17c0 14-10 24-18 28C14 50 6 40 6 26V9Z" fill="#111523" stroke="#8b96f0" stroke-width="2"/>
    <rect x="10" y="25" width="28" height="3" rx="1.5" fill="url(#accent)"/>
    <circle cx="24" cy="27" r="2.5" fill="#c0c8ff"/>
  </g>
  <text x="210" y="130" fill="#f0f3ff" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">SecureCheck</text>
  <text x="210" y="148" fill="#8b96f0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">AI Web Security</text>
  <g transform="translate(460 246)">
    <circle r="70" fill="none" stroke="#232b3b" stroke-width="2"/>
    <circle r="55" fill="none" stroke="#5e6ad2" stroke-width="5" stroke-dasharray="150 190" stroke-linecap="round"/>
    <circle r="38" fill="none" stroke="#384160" stroke-width="3"/>
    <path d="M0-30 28-19v24c0 22-15 35-28 42C-15 40-28 27-28 5v-24Z" fill="#111523" stroke="#8b96f0" stroke-width="3"/>
    <rect x="-25" y="-2" width="50" height="5" rx="2.5" fill="url(#accent)"/>
  </g>
  <text x="418" y="340" fill="#f0f3ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Scanning...</text>
  <g transform="translate(360 374)">
    <rect width="200" height="8" rx="4" fill="#202536"/>
    <rect width="136" height="8" rx="4" fill="url(#accent)"/>
  </g>
  <g transform="translate(312 410)">
    <rect width="296" height="128" rx="12" fill="#13161d" stroke="#2b3242"/>
    <circle cx="30" cy="26" r="6" fill="#22c55e"/>
    <text x="50" y="31" fill="#7ee29a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Checking security headers</text>
    <circle cx="30" cy="58" r="6" fill="#22c55e"/>
    <text x="50" y="63" fill="#7ee29a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Checking exposed files</text>
    <circle cx="30" cy="90" r="6" fill="#8b96f0"/>
    <text x="50" y="95" fill="#f0f3ff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Checking cookies</text>
    <circle cx="30" cy="122" r="6" fill="none" stroke="#6b7890" stroke-width="2"/>
    <text x="50" y="127" fill="#6b7890" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Scanning source code</text>
  </g>
  <text x="98" y="604" fill="#56657a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Scan progress</text>
  <text x="210" y="604" fill="#718096" font-family="Inter, Arial, sans-serif" font-size="15">Passive checks run locally against the active origin.</text>
</svg>
