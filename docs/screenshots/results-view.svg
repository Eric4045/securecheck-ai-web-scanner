<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">SecureCheck results popup state</title>
  <desc id="desc">Demo screenshot showing SecureCheck findings after a scan.</desc>
  <defs>
